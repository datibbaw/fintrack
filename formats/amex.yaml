name: Amex

# Amex CSV files do not embed an account number or currency.
# Always supply --account (and optionally --currency) when importing.

header:
  - row: 1
    mappings:
      - column: A
        expression: '^Date$'
        field: date
      - column: B
        expression: '^Description$'
        field: description
      - column: C
        expression: '^Amount$'
        field: amount
      - column: D
        expression: '^Extended Details$'
        field: ref1
      - column: J
        expression: '^Reference$'
        field: ref2
