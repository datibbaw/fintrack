account_number:
  # dbs bank account type
  - condition:
      location: A1
      expression: 'Account Details For'
    value:
      location: B1
      expression: '(\d[\d-]+\d)$'
  # dbs credit card type
  - condition:
      location: A1
      expression: 'Card Transaction Details For'
    value:
      location: B1
      expression: '([\d-]+\d)$'

currency:
  # dbs credit card type
  # dbs bank account type
  - condition:
      location: A4
      expression: 'Credit Limit|Available Balance'
    value:
      location: B4
      expression: '^(\w+) \d+'

row_formats:
  - name: 'DBS Account Legacy'
    columns:
      - column: A
        expression: '^Transaction Date$'
        field: date
        date_format: '%d %b %Y'
      - column: B
        expression: '^Transaction Code$'
        field: code
      - column: C
        expression: '^Description$'
        field: description
      - column: D
        expression: '^Transaction Ref1$'
        field: ref1
      - column: E
        expression: '^Transaction Ref2$'
        field: ref2
      - column: F
        expression: '^Transaction Ref3$'
        field: ref3
      - column: G
        expression: '^Status$'
        field: status
      - column: H
        expression: '^Debit Amount$'
        field: debit
      - column: I
        expression: '^Credit Amount$'
        field: credit

  - name: 'DBS Account'
    columns:
      - column: A
        expression: '^Transaction Date$'
        field: date
        date_format: '%d %b %Y'
      - column: C
        expression: '^Statement Code$'
        field: code
      - column: D
        expression: '^Description$'
        field: description
      - column: E
        expression: '^Supplementary Code$'
        field: ref1
      - column: F
        expression: '^Supplementary Code Description$'
        field: ref2
      - column: G
        expression: '^Client Reference$'
        field: ref3
      - column: I
        expression: '^Status$'
        field: status
      - column: K
        expression: '^Debit Amount$'
        field: debit
      - column: L
        expression: '^Credit Amount$'
        field: credit

  - name: 'DBS Card'
    columns:
      - column: A
        expression: '^Transaction Date$'
        field: date
        date_format: '%d %b %Y'
      - column: C
        expression: '^Transaction Description$'
        field: description
      - column: D
        expression: '^Transaction Type$'
        field: ref1
      - column: E
        expression: '^Payment Type$'
        field: ref2
      - column: F
        expression: '^Transaction Status$'
        field: status
      - column: G
        expression: '^Debit Amount$'
        field: debit
      - column: H
        expression: '^Credit Amount$'
        field: credit

  - name: 'Amex'
    columns:
      - column: A
        expression: '^Date$'
        field: date
        date_format: '%m/%d/%Y'
      - column: B
        expression: '^Description$'
        field: description
      - column: C
        expression: '^Amount$'
        field: amount
        invert: true # Amex exports payments as negative
      - column: D
        expression: '^Extended Details$'
        field: ref1
      - column: J
        expression: '^Reference$'
        field: ref2
